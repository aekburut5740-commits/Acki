<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Acki-community</title>

    <link rel="icon" type="image/png" href="../pic/logo1.png">
    <link rel="stylesheet" href="../css/community.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/weather.css">
    <link rel="stylesheet" href="../css/middle.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>

    <div id="weatherEvents" aria-hidden="true"></div>

    <div class="share-overlay" id="shareOverlay" onclick="closeShareBox()"></div>

    <div class="share-box" id="shareBox" onclick="event.stopPropagation()">
        <h3 data-en="Share Post" data-th="แชร์โพสต์">Share Post</h3>
        <input class="share-link" id="shareLink" type="text" readonly>
        <button type="button" class="btn-copylink" onclick="copyShareLink()" data-en="Copy Link"
            data-th="คัดลอกลิงก์">Copy Link</button>
    </div>

    <div class="edge-tab edge-top">
        <a href="./profile.html" title="My Profile" class="my-profile-link">
            <i class="ti ti-user-circle"></i>
        </a>
        <i class="ti ti-home" data-en-title="Home" data-th-title="หน้าแรก" title="Home" onclick="goHome()"></i>
        <div class="nav-icon-wrap">
            <i class="ti ti-bell" data-en-title="Notification" data-th-title="การแจ้งเตือน" title="Notification"
                onclick="toggleNotificationMini()"></i>

            <span class="notification-dot" id="notificationDot"></span>
        </div>
        <i class="ti ti-mail" data-en-title="Contact" data-th-title="ติดต่อ" title="Contact" onclick="goContact()"></i>
        <i class="ti ti-info-hexagon" data-en-title="About" data-th-title="เกี่ยวกับ" title="About"
            onclick="goAbout()"></i>

        <div class="settings-wrap">
            <i class="ti ti-dots-vertical" data-en-title="Settings" data-th-title="ตั้งค่า" title="Settings"
                onclick="toggleSettingsMenu()"></i>

            <div class="settings-menu" id="settingsMenu">
                <button type="button" onclick="setThemeMode('auto')" data-theme-option="auto" data-en="Default Theme"
                    data-th="ธีมปกติ">Default Theme</button>
                <button type="button" onclick="setThemeMode('light')" data-theme-option="light" data-en="Light Theme"
                    data-th="ธีมสว่าง">Light Theme</button>
                <button type="button" onclick="setThemeMode('dark')" data-theme-option="dark" data-en="Dark Theme"
                    data-th="ธีมมืด">Dark Theme</button>

                <hr>

                <button type="button" onclick="toggleSceneBackground()"
                    data-en-html="Stage Background <span class=&quot;setting-state&quot; data-setting-state=&quot;scene&quot;>On</span>"
                    data-th-html="พื้นหลังเวที <span class=&quot;setting-state&quot; data-setting-state=&quot;scene&quot;>เปิด</span>">Stage
                    Background <span class="setting-state" data-setting-state="scene">On</span></button>
                <button type="button" onclick="toggleWeather()"
                    data-en-html="Weather Effects <span class=&quot;setting-state&quot; data-setting-state=&quot;weather&quot;>On</span>"
                    data-th-html="สภาพอากาศ <span class=&quot;setting-state&quot; data-setting-state=&quot;weather&quot;>เปิด</span>">Weather
                    Effects <span class="setting-state" data-setting-state="weather">On</span></button>
            </div>
        </div>
        <button type="button" class="lang-toggle" onclick="toggleLanguage()">TH</button>
    </div>

    <div class="create-post-hint">
        Create Post Here
        <span>▼</span>
    </div>

    <button type="button" class="create-post-tab" onclick="toggleCreatePost()" data-en="Create Post"
        data-th="สร้างโพสต์">
        Create Post
    </button>

    <div class="content">
        <div class="create-post" id="createPost">

            <div class="create-post-title-row">
                <h2 id="createPostTitle" data-en="Create Post" data-th="สร้างโพสต์">
                    Create Post
                </h2>

                <button type="button" class="create-post-close" onclick="toggleCreatePost()"
                    aria-label="Close create post">
                    <i class="ti ti-x"></i>
                </button>
            </div>

            <div class="create-header">
                <img src="../pic/visitor.jpg" class="create-avatar" alt="Visitor">

                <div class="create-user">
                    <p class="create-username">
                        Visitor
                    </p>

                    <span class="create-status" data-en="What's on your mind today?"
                        data-th="วันนี้อยากแบ่งปันอะไรดีครับ?">
                        What's on your mind today?
                    </span>
                </div>
            </div>

            <textarea id="createText" class="create-text" placeholder="Share something..."
                data-en-placeholder="Share something..." data-th-placeholder="อยากแบ่งปันอะไรบ้าง..."
                oninput="autoResizePost(this)"></textarea>

            <button id="createPostSubmitButton" type="button" class="create-btn" onclick="createNewPost()"
                data-en="Post" data-th="โพสต์">
                Post
            </button>
        </div>
    </div>

    <div class="focus-overlay" id="focusOverlay" onclick="closeComment()"></div>

    <div class="comment-panel" id="commentPanel">
        <button type="button" class="comment-close-btn" onclick="closeComment()" aria-label="Close comments">×</button>
        <h3 id="commentTitle" data-en="Comments" data-th="ความคิดเห็น">Comments</h3>
        <div id="commentList"></div>

        <div class="comment-input">
            <input id="commentInput" type="text" placeholder="Write a comment..."
                data-en-placeholder="Write a comment..." data-th-placeholder="เขียนความคิดเห็น..."
                onkeydown="commentEnter(event)">
            <button type="button" class="btn-send" onclick="sendComment()" data-en="Send" data-th="ส่ง">Send</button>
        </div>
    </div>

    <div class="notification-mini" id="notificationMini">
        <h3 data-en="Notification" data-th="การแจ้งเตือน">Notification</h3>
        <div id="notificationMiniList"></div>

        <button type="button" class="notification-more-btn" onclick="openNotificationFull()" data-en="More"
            data-th="เพิ่มเติม">
            More
        </button>
    </div>

    <div class="notification-blur" id="notificationBlur" onclick="closeNotificationFull()"></div>

    <div class="notification-full" id="notificationFull">
        <h2 data-en="Notification" data-th="การแจ้งเตือน">Notification</h2>

        <div class="notification-tabs">
            <button onclick="filterNotification('all', event)" class="active" data-en="All"
                data-th="ทั้งหมด">All</button>
            <button onclick="filterNotification('like', event)" data-en="Like" data-th="ถูกใจ">Like</button>
            <button onclick="filterNotification('comment', event)" data-en="Comment"
                data-th="ความคิดเห็น">Comment</button>
        </div>

        <div id="notificationFullList"></div>
    </div>

    <div class="acki-scene" id="ackiScene">
        <div class="scene-sky-object" id="skyObject"></div>

        <div class="walking-tree tree-a"></div>
        <div class="walking-tree tree-b"></div>
        <div class="walking-tree tree-c"></div>
        <div class="walking-tree tree-d"></div>
        <div class="walking-tree tree-e"></div>

        <div class="scene-front"></div>
    </div>

    <div class="coming-soon-popup" id="comingSoonPopup">
        <div class="coming-soon-box">
            <h3 id="comingSoonTitle" data-en="Coming Soon" data-th="เร็ว ๆ นี้">Coming Soon</h3>
            <p data-en="This feature is not available yet." data-th="ฟีเจอร์นี้ยังไม่สามารถใช้งานได้ในตอนนี้ครับ">This
                feature is not available yet.</p>
            <button type="button" onclick="closeComingSoon()" data-en="OK" data-th="ตกลง">OK</button>
        </div>
    </div>

    <div id="serverOffline" class="server-offline">
        <h2 id="serverTitle">Community is sleeping...</h2>

        <p id="serverText">
            Nobody is here yet.
        </p>
    </div>

    <div id="deletePostOverlay" class="delete-post-overlay" onclick="closeDeletePostModal()"></div>

    <section id="deletePostModal" class="delete-post-modal" role="dialog" aria-modal="true"
        aria-labelledby="deletePostTitle">
        <h2 id="deletePostTitle" data-en="Delete this post?" data-th="ลบโพสต์นี้หรือไม่?">
            Delete this post?
        </h2>

        <p data-en="Are you sure? This action cannot be undone." data-th="แน่ใจหรือไม่? การลบนี้ไม่สามารถย้อนกลับได้">
            Are you sure? This action cannot be undone.
        </p>

        <div class="delete-post-actions">
            <button type="button" class="delete-post-cancel" onclick="closeDeletePostModal()" data-en="Cancel"
                data-th="ยกเลิก">
                Cancel
            </button>

            <button id="confirmDeletePostButton" type="button" class="delete-post-confirm" onclick="confirmDeletePost()"
                data-en="Delete" data-th="ลบ">
                Delete
            </button>
        </div>
    </section>

    <script src="../js/auth.js"></script>
    <script src="../js/navigation.js"></script>
    <script src="../js/language.js"></script>
    <script src="../js/appearance.js"></script>
    <script src="../js/notification.js"></script>
    <script src="../js/community.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/weather.js"></script>
    <script src="../js/js.js"></script>
</body>

</html>
