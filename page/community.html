<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acki-community</title>
    <link rel="stylesheet" href="../css/community.css">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/weather.css">
    <link rel="stylesheet" href="../css/middle.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

</head>

<body>

    <!-- Ambient weather / time-of-day events layer (community.html only) -->
    <div id="weatherEvents" aria-hidden="true"></div>

    <div class="share-overlay" id="shareOverlay" onclick="closeShareBox()"></div>

    <div class="share-box" id="shareBox" onclick="event.stopPropagation()">
        <h3>Share Post</h3>

        <input class="share-link" id="shareLink" type="text" readonly>

        <button type="button" class="btn-copylink" onclick="copyShareLink()">Copy Link</button>
    </div>

    <div class="edge-tab edge-top">
        <i class="ti ti-home" title="Home" onclick="goHome()"></i>
        <div class="nav-icon-wrap">
            <i class="ti ti-bell notification-disabled" title="Notification coming soon"
                onclick="showComingSoon('Notification')"></i>
            <span class="notification-dot" id="notificationDot"></span>
        </div>
        <i class="ti ti-mail" title="Contact" onclick="goContact()"></i>
        <i class="ti ti-info-hexagon" title="About" onclick="goAbout()"></i>

        <div class="settings-wrap">
            <i class="ti ti-dots-vertical" title="Settings" onclick="toggleSettingsMenu()"></i>

            <div class="settings-menu" id="settingsMenu">
                <button type="button" onclick="setThemeMode('light')" data-en="Light Theme" data-th="ธีมสว่าง">Light Theme</button>
                <button type="button" onclick="setThemeMode('dark')">Dark Theme</button>

                <hr>

                <button type="button" onclick="toggleSceneBackground()">Toggle Stage Background</button>
                <button type="button" onclick="toggleWeather()">Toggle Weather</button>
            </div>
        </div>
        <button type="button" class="lang-toggle" onclick="toggleLanguage()">EN</button>
    </div>

    <button type="button" class="create-post-tab" onclick="toggleCreatePost()">
        Create Post
    </button>

    <div class="content">
        <div class="create-post" id="createPost">
            <div class="create-header">

                <img src="../pic/visitor.jpg" class="create-avatar">

                <div class="create-user">
                    <p class="create-username">Visitor</p>
                    <span class="create-status">
                        What's on your mind today?
                    </span>
                </div>

            </div>

            <textarea id="createText" class="create-text" placeholder="Share something..."
                oninput="autoResizePost(this)"></textarea>

            <button type="button" class="create-btn" onclick="createNewPost()">Post</button>
        </div>

        <div class="focus-overlay" id="focusOverlay" onclick="closeComment()"></div>

        <div class="comment-panel" id="commentPanel">
            <h3 id="commentTitle">Comments</h3>
            <div id="commentList"></div>

            <div class="comment-input">
                <input id="commentInput" type="text" placeholder="Write a comment..." onkeydown="commentEnter(event)">
                <button type="button" class="btn-send" onclick="sendComment()">Send</button>

            </div>
        </div>

        <div class="notification-mini" id="notificationMini">
            <h3>Notification</h3>
            <div id="notificationMiniList"></div>

            <button type="button" class="notification-more-btn" onclick="openNotificationFull()">
                More
            </button>
        </div>

        <div class="notification-blur" id="notificationBlur" onclick="closeNotificationFull()"></div>

        <div class="notification-full" id="notificationFull">
            <h2>Notification</h2>

            <div class="notification-tabs">
                <button onclick="filterNotification('all', event)" class="active">All</button>
                <button onclick="filterNotification('like', event)">Like</button>
                <button onclick="filterNotification('comment', event)">Comment</button>
                <button onclick="filterNotification('share', event)">Share</button>
            </div>

            <div id="notificationFullList"></div>
        </div>

        <div class="acki-scene" id="ackiScene">
            <div class="scene-sky-object" id="skyObject"></div>

            <div class="walking-tree tree-a"></div>
            <div class="walking-tree tree-b"></div>
            <div class="walking-tree tree-c"></div>
            <div class="walking-tree tree-d"></div>
            <div class="walking-tree tree-e"></div>


            <div class="scene-front"></div>
        </div>

        <div class="coming-soon-popup" id="comingSoonPopup">
            <div class="coming-soon-box">
                <h3 id="comingSoonTitle">Coming Soon</h3>
                <p>ฟีเจอร์นี้ยังไม่สามารถใช้งานได้ในตอนนี้ครับ</p>
                <button type="button" onclick="closeComingSoon()">OK</button>
            </div>
        </div>

        <script src="../js/navigation.js"></script>
        <script src="../js/notification.js"></script>
        <script src="../js/community.js"></script>
        <script src="../js/theme.js"></script>
        <script src="../js/weather.js"></script>
        <script src="../js/js.js"></script>
        <script src="../js/language.js"></script>
</body>

</html>
