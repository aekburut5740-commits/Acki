<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile | Acki</title>

    <link rel="stylesheet" href="../css/account.css">
    <link rel="stylesheet" href="../css/profile.css">
</head>

<body>
    <main class="profile-page">
        <section class="profile-card">
            <div class="profile-topbar">
                <a class="back-link" href="./community.html">
                    ← Back
                </a>

                <button id="logout-button" class="logout-button" type="button">
                    Logout
                </button>
            </div>

            <div id="profile-loading" class="profile-loading">
                Loading profile...
            </div>

            <div id="profile-content" hidden>
                <header class="profile-header">
                    <div class="avatar-wrapper">
                        <img id="avatar-preview" class="avatar-preview" src="" alt="Profile avatar">

                        <div id="avatar-placeholder" class="avatar-placeholder">
                            ?
                        </div>
                    </div>

                    <div class="profile-identity">
                        <h1 id="profile-display-name">
                            Display name
                        </h1>

                        <p id="profile-username">
                            @username
                        </p>

                        <p id="profile-created-at">
                            Joined
                        </p>
                    </div>
                </header>

                <form id="profile-form">
                    <div class="form-group">
                        <label for="display-name">
                            Display name
                        </label>

                        <input id="display-name" name="displayName" type="text" maxlength="50" required>
                    </div>

                    <div class="form-group">
                        <label for="username">
                            Username
                        </label>

                        <input id="username" name="username" type="text" disabled>

                        <small class="field-note">
                            Username can be changed in account settings later.
                        </small>
                    </div>

                    <div class="form-group">
                        <label for="email">
                            Email
                        </label>

                        <input id="email" name="email" type="email" disabled>
                    </div>

                    <div class="form-group">
                        <label for="bio">
                            Bio
                        </label>

                        <textarea id="bio" name="bio" rows="5" maxlength="300"
                            placeholder="Tell people something about yourself..."></textarea>

                        <div class="bio-information">
                            <span>Maximum 300 characters</span>
                            <span id="bio-counter">0 / 300</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="avatar-url">
                            Avatar URL
                        </label>

                        <input id="avatar-url" name="avatarUrl" type="url" placeholder="https://example.com/avatar.png">

                        <small class="field-note">
                            For now, Acki uses an image URL. Uploading images can be added later.
                        </small>
                    </div>

                    <button id="save-profile-button" class="account-button" type="submit">
                        Save profile
                    </button>

                    <p id="profile-message" class="form-message" aria-live="polite"></p>
                </form>
            </div>
        </section>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/profile.js"></script>
</body>

</html>
