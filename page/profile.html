<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile | Acki</title>

    <link rel="icon" type="image/png" href="../pic/logo1.png">
    <link rel="stylesheet" href="../css/account.css">
    <link rel="stylesheet" href="../css/profile.css">
    <link rel="stylesheet" href="../css/middle.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>

<body>
    <div class="edge-tab edge-top">
        <a href="./profile.html" title="My Profile" class="my-profile-link">
            <i class="ti ti-user-circle"></i>
        </a>
        <i class="ti ti-home" data-en-title="Home" data-th-title="หน้าแรก" title="Home" onclick="goHome()"></i>
        <div class="nav-icon-wrap">
            <i class="ti ti-bell" data-en-title="Notification" data-th-title="การแจ้งเตือน" title="Notification"
                onclick="toggleNotificationMini()"></i>

            <span class="notification-dot" id="notificationDot"></span>
        </div>
        <i class="ti ti-mail" data-en-title="Contact" data-th-title="ติดต่อ" title="Contact" onclick="goContact()"></i>
        <i class="ti ti-info-hexagon" data-en-title="About" data-th-title="เกี่ยวกับ" title="About"
            onclick="goAbout()"></i>

        <div class="settings-wrap">
            <i class="ti ti-dots-vertical" data-en-title="Settings" data-th-title="ตั้งค่า" title="Settings"
                onclick="toggleSettingsMenu()"></i>

            <div class="settings-menu" id="settingsMenu">
                <button type="button" onclick="setThemeMode('auto')" data-theme-option="auto" data-en="Default Theme"
                    data-th="ธีมปกติ">Default Theme</button>
                <button type="button" onclick="setThemeMode('light')" data-theme-option="light" data-en="Light Theme"
                    data-th="ธีมสว่าง">Light Theme</button>
                <button type="button" onclick="setThemeMode('dark')" data-theme-option="dark" data-en="Dark Theme"
                    data-th="ธีมมืด">Dark Theme</button>

                <hr>

                <button type="button" onclick="toggleSceneBackground()"
                    data-en-html="Stage Background <span class=&quot;setting-state&quot; data-setting-state=&quot;scene&quot;>On</span>"
                    data-th-html="พื้นหลังเวที <span class=&quot;setting-state&quot; data-setting-state=&quot;scene&quot;>เปิด</span>">Stage
                    Background <span class="setting-state" data-setting-state="scene">On</span></button>
                <button type="button" onclick="toggleWeather()"
                    data-en-html="Weather Effects <span class=&quot;setting-state&quot; data-setting-state=&quot;weather&quot;>On</span>"
                    data-th-html="สภาพอากาศ <span class=&quot;setting-state&quot; data-setting-state=&quot;weather&quot;>เปิด</span>">Weather
                    Effects <span class="setting-state" data-setting-state="weather">On</span></button>
            </div>
        </div>
        <button type="button" class="lang-toggle" onclick="toggleLanguage()">TH</button>
    </div>
    <main class="profile-page">
        <section class="profile-card">
            <div class="profile-topbar">
                <a class="back-link" href="./community.html">
                    ← Back
                </a>

                <button id="logout-button" class="logout-button" type="button">
                    Logout
                </button>
            </div>

            <div id="profile-loading" class="profile-loading">
                Loading profile...
            </div>

            <div id="profile-content" hidden>
                <header class="profile-header">
                    <div class="avatar-wrapper">
                        <img id="avatar-preview" class="avatar-preview" src="" alt="Profile avatar">

                        <div id="avatar-placeholder" class="avatar-placeholder">
                            ?
                        </div>
                    </div>

                    <div class="profile-identity">
                        <h1 id="profile-display-name">
                            Display name
                        </h1>

                        <p id="profile-username">
                            @username
                        </p>

                        <p id="profile-created-at">
                            Joined
                        </p>
                    </div>
                </header>

                <form id="profile-form">
                    <div class="form-group">
                        <label for="display-name">
                            Display name
                        </label>

                        <input id="display-name" name="displayName" type="text" maxlength="50" required>
                    </div>

                    <div class="form-group">
                        <label for="username">
                            Username
                        </label>

                        <input id="username" name="username" type="text" disabled>

                        <small class="field-note">
                            Username can be changed in account settings later.
                        </small>
                    </div>

                    <div class="form-group">
                        <label for="email">
                            Email
                        </label>

                        <input id="email" name="email" type="email" disabled>
                    </div>

                    <div class="form-group">
                        <label for="bio">
                            Bio
                        </label>

                        <textarea id="bio" name="bio" rows="5" maxlength="300"
                            placeholder="Tell people something about yourself..."></textarea>

                        <div class="bio-information">
                            <span>Maximum 300 characters</span>
                            <span id="bio-counter">0 / 300</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="avatar-url">
                            Avatar URL
                        </label>

                        <input id="avatar-url" name="avatarUrl" type="url" placeholder="https://example.com/avatar.png">

                        <small class="field-note">
                            For now, Acki uses an image URL. Uploading images can be added later.
                        </small>
                    </div>

                    <button id="save-profile-button" class="account-button" type="submit">
                        Save profile
                    </button>

                    <p id="profile-message" class="form-message" aria-live="polite"></p>
                </form>
            </div>
        </section>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/profile.js"></script>
</body>

</html>
