<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <link rel="stylesheet" href="../css/middle.css">
    <link rel="stylesheet" href="../css/contact.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>

<body>
    <div class="edge-tab edge-top">
        <i class="ti ti-home" title="Home" onclick="goHome()"></i>
        <div class="nav-icon-wrap">
            <i class="ti ti-bell notification-disabled" title="Notification coming soon"
                onclick="showComingSoon('Notification')"></i>
            <span class="notification-dot" id="notificationDot"></span>
        </div>
        <i class="ti ti-mail" title="Contact" onclick="goContact()"></i>
        <i class="ti ti-info-hexagon" title="About" onclick="goAbout()"></i>
        <div class="settings-wrap">
            <i class="ti ti-dots-vertical" title="Settings" onclick="toggleSettingsMenu()"></i>

            <div class="settings-menu" id="settingsMenu">
                <button type="button" onclick="setThemeMode('light')">Light Theme</button>
                <button type="button" onclick="setThemeMode('dark')">Dark Theme</button>

                <hr>

                <button type="button" onclick="toggleSceneBackground()">Toggle Stage Background</button>
                <button type="button" onclick="toggleWeather()">Toggle Weather</button>
            </div>
        </div>
        <button type="button" class="lang-toggle" onclick="toggleLanguage()">EN</button>
    </div>

    <main class="contact-page">

        <section class="contact-card">
            <div class="page-title">
                <button class="back-btn" onclick="goCommunity()" title="Back to Community">
                    <i class="ti ti-chevron-left"></i>
                </button>
            </div>

            <h1 class="contact-title1">Contact</h1>

            <p class="contact-desc">
                Use this form to report bugs, suggest improvements, or tell us what you need.
                Please explain your request as clearly as possible.
            </p>

            <input id="contactEmail" type="email" placeholder="Your email">

            <select id="contactSubject">
                <option value="Bug Report">Bug Report</option>
                <option value="Suggestion">Suggestion</option>
                <option value="Question">Question</option>
                <option value="Other">Other</option>
            </select>

            <textarea id="contactMessage" placeholder="Write your message..."></textarea>

            <button onclick="sendContactMail()">Send</button>
        </section>
    </main>

    <div class="notification-mini" id="notificationMini">
        <h3>Notification</h3>
        <div id="notificationMiniList"></div>

        <button class="notification-more-btn" onclick="openNotificationFull()">
            More
        </button>
    </div>

    <div class="notification-blur" id="notificationBlur" onclick="closeNotificationFull()"></div>

    <div class="notification-full" id="notificationFull">
        <h2>Notification</h2>

        <div class="notification-tabs">
            <button onclick="filterNotification('all', event)" class="active">All</button>
            <button onclick="filterNotification('like', event)">Like</button>
            <button onclick="filterNotification('comment', event)">Comment</button>
            <button onclick="filterNotification('share', event)">Share</button>
        </div>

        <div id="notificationFullList"></div>
    </div>

    <div class="coming-soon-popup" id="comingSoonPopup">
        <div class="coming-soon-box">
            <h3 id="comingSoonTitle">Coming Soon</h3>
            <p>ฟีเจอร์นี้ยังไม่สามารถใช้งานได้ในตอนนี้ครับ</p>
            <button type="button" onclick="closeComingSoon()">OK</button>
        </div>
    </div>

    <script src="../js/navigation.js"></script>
    <script src="../js/notification.js"></script>
    <script src="../js/contact.js"></script>
    <script src="../js/js.js"></script>
    <script src="js/language.js"></script>
</body>

</html>
